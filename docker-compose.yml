version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: examai-backend
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads
      - db_data:/app/db
    environment:
      - DATABASE_URL=sqlite:////app/db/examai.db
    env_file:
      - ./backend/.env
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: examai-frontend
    ports:
      - "5500:80"
    depends_on:
      - backend
    restart: always

volumes:
  uploads_data:
  db_data:

    # Optional: Add a PostgreSQL service if you want to move away from SQLite
